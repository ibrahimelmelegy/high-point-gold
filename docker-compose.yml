version: '3.8'
services:
  high-point-gold:
    build: .
    image: high-point-gold-app
    container_name: high-point-gold
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/realtime').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
